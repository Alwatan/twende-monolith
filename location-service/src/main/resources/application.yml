server:
  port: 8087

spring:
  application:
    name: location-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/twende_locations
    username: ${DB_USER:twende}
    password: ${DB_PASSWORD:twende}
    hikari:
      maximum-pool-size: 15
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: location-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "tz.co.twende.*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    sampling:
      probability: 1.0

twende:
  maps:
    google:
      api-key: ${GOOGLE_MAPS_API_KEY:}
      enabled: ${GOOGLE_MAPS_ENABLED:true}
    osrm:
      base-url: ${OSRM_BASE_URL:http://localhost:5000}
      enabled: ${OSRM_ENABLED:false}
    nominatim:
      base-url: ${NOMINATIM_BASE_URL:http://localhost:8088}
      enabled: ${NOMINATIM_ENABLED:false}
  services:
    country-config-service:
      url: ${COUNTRY_CONFIG_SERVICE_URL:http://localhost:8082}

logging:
  level:
    tz.co.twende: DEBUG
    org.springframework.kafka: WARN
