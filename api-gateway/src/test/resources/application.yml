server:
  port: 0

spring:
  application:
    name: api-gateway-test
  main:
    web-application-type: reactive
    allow-bean-definition-overriding: true
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration
  cloud:
    gateway:
      server:
        webflux:
          default-filters: []
          routes:
            - id: user-service
              uri: http://localhost:19999
              predicates:
                - Path=/api/v1/users/**
              filters:
                - AuthFilter

            - id: driver-service
              uri: http://localhost:19999
              predicates:
                - Path=/api/v1/drivers/**
              filters:
                - AuthFilter

            - id: auth-service
              uri: http://localhost:19999
              predicates:
                - Path=/api/v1/auth/**

            - id: block-internal
              uri: no://op
              predicates:
                - Path=/internal/**
              filters:
                - SetStatus=404

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.twende.gateway: DEBUG
