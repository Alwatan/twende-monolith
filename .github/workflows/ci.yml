name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  actions: read
  security-events: write
  pull-requests: write

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'temurin'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ──────────────────────────────────────────────
  # Stage 1: Lint (fast feedback)
  # ──────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven
      - name: Check code formatting
        run: ./mvnw spotless:check --no-transfer-progress

  # ──────────────────────────────────────────────
  # Stage 2: Build all modules + run tests
  # ──────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: twende_test
          POSTGRES_USER: twende
          POSTGRES_PASSWORD: twende
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U twende -d twende_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Build all modules (install to local repo)
        env:
          DB_HOST: localhost
          DB_USER: twende
          DB_PASSWORD: twende
          REDIS_HOST: localhost
          SMS_DEV_MODE: "true"
        run: ./mvnw clean install --no-transfer-progress

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/target/surefire-reports/'
          retention-days: 14

  # ──────────────────────────────────────────────
  # Stage 3: Security scanning (Trivy)
  # ──────────────────────────────────────────────
  security-scan:
    name: Trivy Dependency Scan
    needs: [build-and-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Install common-lib and resolve dependencies
        run: ./mvnw install -DskipTests --no-transfer-progress

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true
          format: table

      - name: Trivy filesystem scan (SARIF)
        uses: aquasecurity/trivy-action@v0.35.0
        if: always()
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: sarif
          output: trivy-fs-results.sarif

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-dependency-scan

  # ──────────────────────────────────────────────
  # Stage 4: Static Analysis (CodeQL)
  # ──────────────────────────────────────────────
  sast:
    name: Static Analysis (CodeQL)
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven
      - run: ./mvnw compile --no-transfer-progress -DskipTests
      - uses: github/codeql-action/analyze@v4
        with:
          category: /language:java-kotlin

  # ──────────────────────────────────────────────
  # Stage 5: Deploy (placeholder)
  # ──────────────────────────────────────────────
  # Container build, scan, and publish will be re-enabled
  # once per-service Dockerfiles are in place.
  # Each service will get its own image:
  #   ghcr.io/alwatan/auth-service:sha
  #   ghcr.io/alwatan/ride-service:sha
  #   etc.
