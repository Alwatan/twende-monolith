server:
  port: 8080

spring:
  application:
    name: twende
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/twende
    username: ${DB_USER:twende}
    password: ${DB_PASSWORD:twende}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      password: ${REDIS_PASSWORD:}
  security:
    oauth2:
      authorizationserver:
        issuer-uri: ${AUTH_ISSUER_URI:http://localhost:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    sampling:
      probability: 1.0

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

twende:
  sms:
    dev-mode: ${SMS_DEV_MODE:true}
  maps:
    google:
      api-key: ${GOOGLE_MAPS_API_KEY:}
      enabled: ${GOOGLE_MAPS_ENABLED:true}
    osrm:
      base-url: ${OSRM_BASE_URL:http://localhost:5000}
      enabled: ${OSRM_ENABLED:false}
    nominatim:
      base-url: ${NOMINATIM_BASE_URL:http://localhost:8088}
      enabled: ${NOMINATIM_ENABLED:false}
    cache-ttl-minutes: 30
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:twende}
    secret-key: ${MINIO_SECRET_KEY:twende123}
    bucket-documents: twende-driver-documents
    bucket-photos: twende-profile-photos
  selcom:
    api-key: ${SELCOM_API_KEY:}
    api-secret: ${SELCOM_API_SECRET:}
    base-url: ${SELCOM_BASE_URL:https://apigw.selcommobile.com/v1}
  firebase:
    service-account-json: ${FIREBASE_SERVICE_ACCOUNT_JSON:}
  africastalking:
    api-key: ${AT_API_KEY:}
    username: ${AT_USERNAME:sandbox}
    sender-id: TWENDE
  otp:
    length: 6
    expiry-minutes: 5
    max-attempts: 3
    rate-limit-per-window: 3
    rate-limit-window-minutes: 10
  matching:
    initial-radius-km: 3.0
    second-radius-km: 5.0
    max-radius-km: 10.0
    offer-window-seconds: 15
    expansion-interval-seconds: 60
    total-timeout-seconds: 180

logging:
  level:
    com.twende: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
