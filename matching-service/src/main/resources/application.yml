server:
  port: 8086

spring:
  application:
    name: matching-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/twende_matching
    username: ${DB_USER:twende}
    password: ${DB_PASSWORD:twende}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: matching-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "tz.co.twende.*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    sampling:
      probability: 1.0

twende:
  matching:
    offer-window-seconds: 15
    max-radius-km: 10
    expansion-interval-seconds: 30
    max-expansion-batches: 3
  services:
    location-url: ${LOCATION_SERVICE_URL:http://localhost:8087}
    driver-url: ${DRIVER_SERVICE_URL:http://localhost:8084}
    rating-url: ${RATING_SERVICE_URL:http://localhost:8092}
    ride-url: ${RIDE_SERVICE_URL:http://localhost:8085}

logging:
  level:
    tz.co.twende: DEBUG
    org.springframework.kafka: WARN
