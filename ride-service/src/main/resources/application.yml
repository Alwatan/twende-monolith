server:
  port: 8085

spring:
  application:
    name: ride-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/twende_rides
    username: ${DB_USER:twende}
    password: ${DB_PASSWORD:twende}
    hikari:
      maximum-pool-size: 15
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ride-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "tz.co.twende.*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    sampling:
      probability: 1.0

twende:
  services:
    pricing-service:
      url: ${PRICING_SERVICE_URL:http://localhost:8088}
    location-service:
      url: ${LOCATION_SERVICE_URL:http://localhost:8087}
    loyalty-service:
      url: ${LOYALTY_SERVICE_URL:http://localhost:8095}
    country-config-service:
      url: ${COUNTRY_CONFIG_SERVICE_URL:http://localhost:8082}
    matching-service:
      url: ${MATCHING_SERVICE_URL:http://localhost:8086}

logging:
  level:
    tz.co.twende: DEBUG
    org.springframework.kafka: WARN
