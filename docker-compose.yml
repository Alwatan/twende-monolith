services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: twende
      POSTGRES_USER: twende
      POSTGRES_PASSWORD: twende
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U twende -d twende"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zipkin:
    image: openzipkin/zipkin:3
    ports:
      - "9411:9411"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: twende
      MINIO_ROOT_PASSWORD: twende123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  twende:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_USER: twende
      DB_PASSWORD: twende
      REDIS_HOST: redis
      MINIO_ENDPOINT: http://minio:9000
      SMS_DEV_MODE: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - full

volumes:
  postgres_data:
  redis_data:
  minio_data:
